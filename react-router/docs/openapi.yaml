openapi: 3.1.0
info:
  title: App API
  version: 1.0.0
  description: REST API for managing users, roles, tenants, and permissions.

servers:
  - url: /api/v1
    description: API v1

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: API key passed as Bearer token

  parameters:
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    pageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      description: Unique key to ensure idempotent POST requests (replays cached response within 24h)
      schema:
        type: string

  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        username:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED, LOCKED]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Role:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        scope:
          type: string
          enum: [GLOBAL, TENANT, EVENT]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Tenant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        email:
          type: string
        subscriptionPlan:
          type: string
        createdAt:
          type: string
          format: date-time

    Permission:
      type: object
      properties:
        id:
          type: string
        resource:
          type: string
        action:
          type: string
        description:
          type: string
          nullable: true

paths:
  /users:
    get:
      summary: List users
      operationId: listUsers
      tags: [Users]
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: Paginated list of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — missing user:read permission

    post:
      summary: Create a user
      operationId: createUser
      tags: [Users]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                name:
                  type: string
                username:
                  type: string
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "400":
          description: Validation error
        "409":
          description: Email already exists

  /users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string

    get:
      summary: Get a user
      operationId: getUser
      tags: [Users]
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "404":
          description: User not found

    put:
      summary: Update a user
      operationId: updateUser
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                username:
                  type: string
                status:
                  type: string
                  enum: [ACTIVE, INACTIVE, SUSPENDED, LOCKED]
      responses:
        "200":
          description: User updated
        "404":
          description: User not found

    delete:
      summary: Soft-delete a user
      operationId: deleteUser
      tags: [Users]
      responses:
        "200":
          description: User deleted
        "404":
          description: User not found

  /roles:
    get:
      summary: List roles
      operationId: listRoles
      tags: [Roles]
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: Paginated list of roles

    post:
      summary: Create a role
      operationId: createRole
      tags: [Roles]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                description:
                  type: string
                scope:
                  type: string
                  enum: [GLOBAL, TENANT, EVENT]
                  default: TENANT
      responses:
        "201":
          description: Role created

  /roles/{roleId}:
    parameters:
      - name: roleId
        in: path
        required: true
        schema:
          type: string

    get:
      summary: Get a role with permissions
      operationId: getRole
      tags: [Roles]
      responses:
        "200":
          description: Role details with permissions
        "404":
          description: Role not found

    put:
      summary: Update a role
      operationId: updateRole
      tags: [Roles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                description:
                  type: string
      responses:
        "200":
          description: Role updated
        "404":
          description: Role not found

    delete:
      summary: Soft-delete a role
      operationId: deleteRole
      tags: [Roles]
      responses:
        "200":
          description: Role deleted
        "404":
          description: Role not found

  /tenants:
    get:
      summary: List tenants
      operationId: listTenants
      tags: [Tenants]
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: Paginated list of tenants

  /permissions:
    get:
      summary: List permissions
      operationId: listPermissions
      tags: [Permissions]
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: Paginated list of permissions
